name: Deploy website

# Publishes this static product site (the whole repo) to GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer runs cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v6
      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .
          # Required so /.well-known/ (AASA + assetlinks.json for universal
          # links) ships — the action otherwise excludes all dotfiles/dirs.
          include-hidden-files: true
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
